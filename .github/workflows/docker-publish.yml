name: Build and Push to Docker Hub

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract GITNEXUS_VERSION from Dockerfile
        id: version
        run: |
          VERSION=$(grep -m1 '^ARG GITNEXUS_VERSION=' Dockerfile | cut -d= -f2)
          echo "gitnexus_version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            funtuan/gitnexus-gateway:latest
            funtuan/gitnexus-gateway:${{ steps.version.outputs.gitnexus_version }}
          build-args: |
            GITNEXUS_VERSION=${{ steps.version.outputs.gitnexus_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
